<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef8ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="J" />
    <title>J - AI Companion</title>
    <link rel="manifest" href="./manifest.json?v=6" />
    <link rel="stylesheet" href="./styles.css?v=6" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card" aria-label="J와의 채팅">
        <header class="chat-header">
          <button class="profile-trigger" id="profileButton" type="button" aria-label="J 프로필 보기">
            <span class="avatar" aria-hidden="true">
              <img id="avatarImage" alt="" hidden />
              <span id="avatarInitial">J</span>
            </span>
            <span class="title-block">
              <span class="eyebrow">온라인</span>
              <span class="chat-title">J</span>
            </span>
          </button>
          <button class="ghost-button" id="resetButton" type="button">초기화</button>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">메시지 입력</label>
          <textarea
            id="messageInput"
            name="message"
            rows="1"
            autocomplete="off"
            placeholder="J에게 메시지 보내기"
          ></textarea>
          <button type="submit">전송</button>
        </form>
      </section>
    </main>

    <section class="profile-sheet" id="profileSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-profile></div>
      <div class="sheet-card" role="dialog" aria-modal="true" aria-label="J 프로필 정보">
        <button class="sheet-close" type="button" data-close-profile aria-label="닫기">×</button>
        <label class="profile-photo" for="photoInput">
          <img id="profileImage" alt="J 프로필 사진" hidden />
          <span id="profileInitial">J</span>
          <small>사진 변경</small>
        </label>
        <input class="sr-only" id="photoInput" type="file" accept="image/*" />

        <h2>J</h2>

        <div class="relationship-card">
          <div class="relationship-row">
            <span>관계</span>
            <strong id="relationshipStage">친해진 친구</strong>
          </div>
          <div class="affection-row">
            <div>
              <span>친밀도</span>
              <strong id="affectionLabel">천천히 가까워지는 중</strong>
            </div>
            <span class="affection-percent"><span id="affectionScore">12</span>%</span>
          </div>
          <div class="affection-track" aria-hidden="true">
            <div class="affection-fill" id="affectionFill"></div>
          </div>
        </div>

        <p class="sheet-hint">대화가 쌓일수록 J와의 거리감이 자연스럽게 가까워져.</p>
      </div>
    </section>

    <script src="./app.js?v=6"></script>
  </body>
</html>
