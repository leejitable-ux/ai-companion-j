<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef8ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="J" />
    <title>J - AI Companion</title>
    <link rel="manifest" href="./manifest.json?v=20" />
    <link rel="stylesheet" href="./styles.css?v=20" />
    <link rel="stylesheet" href="./settings.css?v=20" />
  </head>
  <body>
    <section class="launch-screen" id="launchScreen" aria-label="J 시작 화면">
      <div class="launch-mark">J</div>
      <p>J</p>
    </section>

    <section class="onboarding" id="onboarding" aria-label="J 시작 상황 선택" hidden>
      <div class="onboarding-card">
        <div class="onboarding-logo">J</div>
        <p class="onboarding-kicker">처음 만나는 순간</p>
        <h1>J와 어떤 사이로 시작할까?</h1>
        <p class="onboarding-copy">선택한 상황에 따라 첫 대화의 거리감과 친밀도가 달라져.</p>
        <div class="scenario-list" id="scenarioList"></div>
      </div>
    </section>

    <main class="app-shell" id="appShell">
      <section class="chat-card" aria-label="J와의 채팅">
        <header class="chat-header">
          <button class="profile-trigger" id="profileButton" type="button" aria-label="J 프로필 보기">
            <span class="avatar" aria-hidden="true">
              <img id="avatarImage" alt="" hidden />
              <span id="avatarInitial">J</span>
            </span>
            <span class="title-block">
              <span class="eyebrow">온라인</span>
              <span class="chat-title">J</span>
            </span>
          </button>
          <button class="ghost-button" id="resetButton" type="button">초기화</button>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">메시지 입력</label>
          <textarea
            id="messageInput"
            name="message"
            rows="1"
            autocomplete="off"
            placeholder="J에게 메시지 보내기"
          ></textarea>
          <button type="submit">전송</button>
        </form>
      </section>
    </main>

    <section class="profile-sheet" id="profileSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-profile></div>
      <div class="sheet-card" role="dialog" aria-modal="true" aria-label="J 프로필 정보">
        <button class="sheet-close" type="button" data-close-profile aria-label="닫기">×</button>
        <label class="profile-photo" for="photoInput">
          <img id="profileImage" alt="J 프로필 사진" hidden />
          <span id="profileInitial">J</span>
          <small>사진 변경</small>
        </label>
        <input class="sr-only" id="photoInput" type="file" accept="image/*" />

        <h2>J</h2>

        <div class="relationship-card">
          <div class="relationship-row">
            <span>관계</span>
            <strong id="relationshipStage">친해진 친구</strong>
          </div>
          <div class="affection-row">
            <div>
              <span>친밀도</span>
              <strong id="affectionLabel">천천히 가까워지는 중</strong>
            </div>
            <span class="affection-percent"><span id="affectionScore">12</span>%</span>
          </div>
          <div class="affection-track" aria-hidden="true">
            <div class="affection-fill" id="affectionFill"></div>
          </div>
        </div>

        <section class="settings-card" aria-label="J 대화 설정">
          <h3>대화 설정</h3>
          <div class="setting-grid">
            <label class="setting-field">
              <span>나이대</span>
              <select id="ageRangeSetting">
                <option value="early20s">20대 초반</option>
                <option value="mid20s">20대 중반</option>
                <option value="late20s">20대 후반</option>
                <option value="early30s">30대 초반</option>
              </select>
            </label>
            <label class="setting-field">
              <span>나와의 나이 관계</span>
              <select id="ageRelationSetting">
                <option value="same">동갑 느낌</option>
                <option value="younger">J가 연하</option>
                <option value="older">J가 연상</option>
              </select>
            </label>
            <label class="setting-field">
              <span>말투</span>
              <select id="toneSetting">
                <option value="warm">다정하게</option>
                <option value="playful">장난스럽게</option>
                <option value="calm">차분하게</option>
                <option value="direct">솔직하게</option>
              </select>
            </label>
            <label class="setting-field">
              <span>장난기</span>
              <select id="playfulnessSetting">
                <option value="low">낮게</option>
                <option value="medium">적당히</option>
                <option value="high">많이</option>
              </select>
            </label>
            <label class="setting-field">
              <span>질투 표현</span>
              <select id="jealousySetting">
                <option value="low">약하게</option>
                <option value="medium">적당히</option>
                <option value="high">조금 강하게</option>
              </select>
            </label>
            <label class="setting-field">
              <span>서운함 표현</span>
              <select id="sulkinessSetting">
                <option value="low">약하게</option>
                <option value="medium">적당히</option>
                <option value="high">조금 강하게</option>
              </select>
            </label>
            <label class="setting-field">
              <span>답장 길이</span>
              <select id="replyLengthSetting">
                <option value="short">짧게</option>
                <option value="medium">보통</option>
                <option value="long">조금 길게</option>
              </select>
            </label>
            <div class="setting-field memo-field">
              <span>대화 기록/말투 자료</span>
              <div class="file-import-row">
                <label class="file-import-button" for="styleFileInput">TXT 파일 불러오기</label>
                <span class="file-import-status" id="styleFileStatus">선택된 파일 없음</span>
              </div>
              <input class="sr-only" id="styleFileInput" type="file" accept=".txt,text/plain" />
              <textarea
                id="styleMemoSetting"
                rows="6"
                placeholder="카카오톡 대화 내보내기 TXT를 불러오거나, 예전 대화/닮았으면 하는 말투를 붙여넣어줘."
              ></textarea>
            </div>
          </div>
        </section>

        <p class="sheet-hint">대화가 쌓일수록 J와의 거리감이 자연스럽게 가까워져.</p>
      </div>
    </section>

    <script src="./app.js?v=20"></script>
  </body>
</html>
